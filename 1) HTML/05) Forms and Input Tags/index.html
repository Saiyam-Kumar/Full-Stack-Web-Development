<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Application Form</title>
</head>
<body>

    <h1>Internship Application Form</h1>

    <form action="">

        <div>
            <label for="username">Enter your Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your Username" required>
        </div>
        <br>

        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your Email" required>
        </div>
        <br>

        <div>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your Phone Number">
        </div>
        <br>

        <div>
            <p>Select Gender:</p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
        </div>
        <br>

        <div>
            <p>Select Your Skills:</p>
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label>

            <input type="checkbox" id="react" name="skills" value="React">
            <label for="react">React</label>
        </div>
        <br>

        <div>
            <label for="college">College Name:</label>
            <input type="text" id="college" name="college">
        </div>
        <br>

        <div>
            <label for="role">Preferred Role:</label>
            <select id="role" name="role">
                <option value="">Select Role</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="fullstack">Full Stack Developer</option>
            </select>
        </div>
        <br>

        <div>
            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" name="resume">
        </div>
        <br>

        <div>
            <label for="about">Tell us about yourself:</label>
            <br>
            <textarea id="about" name="about" rows="5" cols="40"></textarea>
        </div>
        <br>

        <div>
            <input type="submit" value="Apply Now">
            <input type="reset" value="Reset Form">
        </div>

    </form>

</body>
</html>
