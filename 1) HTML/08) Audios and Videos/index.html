<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio and Video in HTML</title>
</head>
<body>

    <h1>HTML Audio and Video Demo</h1>

    <hr>

    <!-- Audio Section -->
    <h2>Audio Example</h2>
    <audio src="audio.mp3"></audio>

    <hr>

    <!-- SVG(Scalable Vector Graphics) - Used to draw shapes in HTML.-->
    <h2>SVG Example</h2>
     <svg height="100" width="100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red" />
    </svg>
    
    <hr>
    
    <!-- Video Section -->
    <h2>Video Example</h2>
    <video width="500" controls>
        <source src="sample.mp4" type="video/mp4">
    </video>

    <hr>

    <!-- Video with autoplay and muted -->
    <h2>Autoplay Video Example</h2>
    <video width="500" autoplay muted loop>
        <source src="sample.mp4" type="video/mp4">
    </video>

    <hr>

    <!-- Embedded YouTube Video -->
    <h2>YouTube Embed Example</h2>
    <iframe
    width="560"
    height="315"
    src="https://www.youtube.com/embed/syFZfO_wfMQ"
    title="YouTube video player"
    allowfullscreen>
    </iframe>

</body>
</html>
