<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline,Internal and External CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<!--This is Internal CSS-->
<style> 
    div{
        background-color: burlywood;
    }
    h1{
        background-color: yellow;
    }
</style>
<body>
    <h1 style="color: red;">There are three types of CSS.</h1> <!--This is Inline CSS-->
    <div>
        <ol type="A">
            <li>Inline CSS</li>
            <li>Internal CSS</li>
            <li>External CSS</li>
        </ol>
    </div>
    <!--This is External CSS-->
    <p>
        In paragraph I m adding External CSS by creating a another .css file 
        and making this content's color blue and background color pink. 
    </p>
    
</body>
</html>
